<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - KOLEKU</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="icon" href="../assets/images/logo.png">
</head>
<body>
  <div id="navbar"></div>

  <div class="container">
    <div class="form-box">
      <h2>Daftar Akun</h2>
      <p class="subtitle">Buat akun KOLEKU baru</p>

      <form onsubmit="handleDaftar(event)">
        <p id="error" class="error"></p>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="email@contoh.com" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="namaDepan">Nama Depan</label>
            <input type="text" id="namaDepan" required>
          </div>
          <div class="form-group">
            <label for="namaBelakang">Nama Belakang</label>
            <input type="text" id="namaBelakang" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 6 karakter" required>
        </div>

        <button type="submit" class="btn btn-block">Daftar</button>

        <p class="form-link">
          Sudah punya akun? <a href="login.html">Masuk</a>
        </p>
      </form>
    </div>
  </div>

  <div id="footer"></div>
  <script src="../assets/js/script.js"></script>
</body>
</html>
