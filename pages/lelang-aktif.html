!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lelang Aktif - KOLEKU</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body><
  <div id="navbar"></div>

  <div class="container">
    <h1 style="text-align:center; margin:30px 0; color:#b8860b;">Lelang Sedang Berlangsung</h1>
    <div id="lelang-grid" class="grid"></div>
  </div>

  <div id="footer"></div>

  <script src="../assets/js/script.js?v=2"></script>
  <script>
    // Data lelang — endTime disimpan di localStorage agar tidak reset saat pindah halaman
    const lelangDefaults = [
      { id: 2, key: "lelang_guci", nama: "Guci Keramik Bunga Eropa", harga: 3700000, durasiMs: 1000 * 60 * 90, gambar: "../assets/images/produk/european-ceramic-flower-vase-antique.jpg" },
      { id: 9, key: "lelang_radio", nama: "Radio Vintage Merah", harga: 700000, durasiMs: 1000 * 60 * 45, gambar: "../assets/images/produk/red-vintage-retro-radio.jpg" },
      { id: 10, key: "lelang_gitar", nama: "Gitar Listrik Klasik Hijau", harga: 2700000, durasiMs: 1000 * 60 * 65, gambar: "../assets/images/produk/green-classic-electric-guitar.jpg" },
      { id: 8, key: "lelang_flatshoes", nama: "Flatshoes Hijau Gucci", harga: 1800000, durasiMs: 1000 * 60 * 130, gambar: "../assets/images/produk/green-gucci-flat-shoes-luxury.jpg" }
    ];

    // Ambil atau buat endTime yang tersimpan di localStorage
    function getPersistedEndTime(key, durasiMs) {
      const stored = localStorage.getItem(key);
      if (stored) {
        return parseInt(stored, 10);
      }
      const endTime = Date.now() + durasiMs;
      localStorage.setItem(key, endTime.toString());
      return endTime;
    }

    let lelangItems = lelangDefaults.map(item => ({
      id: item.id,
      nama: item.nama,
      harga: item.harga,
      gambar: item.gambar,
      endTime: getPersistedEndTime(item.key, item.durasiMs)
    }));

    function formatCountdown(ms) {
      if (ms <= 0) return "Lelang telah berakhir";

      const hours = Math.floor(ms / (1000 * 60 * 60));
      const minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((ms % (1000 * 60)) / 1000);

      return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

function renderLelang() {
    const grid = document.getElementById("lelang-grid");
    if (!grid) return;
    let html = "";

    lelangItems.forEach(item => {
      const timeLeft = item.endTime - Date.now();
      const countdownText = formatCountdown(timeLeft);

      html += `
        <div class="card" onclick="goToProduct(${item.id})" style="cursor:pointer;">
          <img src="${item.gambar}" alt="${item.nama}" style="width:100%; height:160px; object-fit:cover;">
          <div class="body">
            <div class="title">${item.nama}</div>
            <div class="price">Rp ${item.harga.toLocaleString('id-ID')}</div>
            <div style="margin-top:8px; color:#c0392b; font-weight:bold;">
              ⏳ ${countdownText}
            </div>
          </div>
        </div>`;
    });

    grid.innerHTML = html;
  }

  function goToProduct(id) {
    window.location.href = `produk.html?id=${id}`;
  }
  
    // Update countdown setiap detik
    function startCountdown() {
      renderLelang();                    // render pertama
      setInterval(() => {
        renderLelang();
      }, 1000);
    }

    // Jalankan saat halaman dimuat
    document.addEventListener("DOMContentLoaded", () => {
      startCountdown();
    });
  </script>
</body>
</html>
