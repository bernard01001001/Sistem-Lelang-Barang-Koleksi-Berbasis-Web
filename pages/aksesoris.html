<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aksesoris - KOLEKU</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div id="navbar"></div>

  <div class="container">
    <h1 style="text-align:center; margin:30px 0; color:#b8860b;">Kategori Aksesoris</h1>
    <div id="produk-grid" class="grid"></div>
  </div>

  <div id="footer"></div>

  <script src="../assets/js/script.js"></script>
  <script>
    const aksesoris = [
      {id:3, nama:"Jam Tangan Analog Wanita", harga:850000, gambar:"../assets/images/produk/elegant-women-analog-wristwatch-gold.jpg"},
      {id:4, nama:"Tote Bag Gucci Wanita", harga:15700000, gambar:"../assets/images/produk/elegant-women-analog-wristwatch-gold.jpg"},
    ];

    function renderProduk(items) {
      const grid = document.getElementById("produk-grid");
      let html = "";
      items.forEach(p => {
        html += `
          <a href="produk.html?id=${p.id}" style="text-decoration:none; color:inherit;">
            <div class="card" style="cursor:pointer;">
              <img src="${p.gambar}" alt="${p.nama}" style="width:100%; height:160px; object-fit:cover;">
              <div class="body">
                <div class="title">${p.nama}</div>
                <div class="price">Rp ${p.harga.toLocaleString('id-ID')}</div>
              </div>
            </div>
          </a>`;
      });
      grid.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderProduk(aksesoris);
    });
  </script>
</body>
</html>
