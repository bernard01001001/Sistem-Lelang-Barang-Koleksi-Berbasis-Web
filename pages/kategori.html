<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kategori - KOLEKU</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>
  <div id="navbar"></div>

  <div class="container">
    <h1 style="text-align:center; margin:30px 0; color:#b8860b;">Semua Kategori</h1>

    <!-- Filter Kategori -->
    <div style="text-align:center; margin-bottom:20px;">
      <button onclick="filterKategori('all')" class="btn" style="margin:5px;">Semua</button>
      <button onclick="filterKategori('Antik & Seni')" class="btn" style="margin:5px;">Antik & Seni</button>
      <button onclick="filterKategori('Aksesoris')" class="btn" style="margin:5px;">Aksesoris</button>
      <button onclick="filterKategori('Kerajinan')" class="btn" style="margin:5px;">Kerajinan</button>
      <button onclick="filterKategori('Dekorasi')" class="btn" style="margin:5px;">Dekorasi</button>
      <button onclick="filterKategori('Fashion')" class="btn" style="margin:5px;">Fashion</button>
    </div>

    <div id="grid-produk" class="grid"></div>
  </div>

  <div id="footer"></div>

  <script src="../assets/js/script.js"></script>
  <script>
    window.kategoriAktif = 'all';

    function filterKategori(kat) {
      window.kategoriAktif = kat;
      renderGridProduk();
    }
  </script>
</body>

</html>
