<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kategori - KOLEKU</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>
  <div id="navbar"></div>

  <div class="container">
    <h1 style="text-align:center; margin:30px 0; color:#b8860b;">Semua Kategori</h1>

    <!-- Filter Kategori -->
    <div style="text-align:center; margin-bottom:20px;">
      <button onclick="filterKategori('all')" class="btn" style="margin:5px;">Semua</button>
      <button onclick="filterKategori('Antik & Seni')" class="btn" style="margin:5px;">Antik & Seni</button>
      <button onclick="filterKategori('Aksesoris')" class="btn" style="margin:5px;">Aksesoris</button>
      <button onclick="filterKategori('Kerajinan')" class="btn" style="margin:5px;">Kerajinan</button>
      <button onclick="filterKategori('Dekorasi')" class="btn" style="margin:5px;">Dekorasi</button>
      <button onclick="filterKategori('Fashion')" class="btn" style="margin:5px;">Fashion</button>
    </div>

    <div id="produk-grid" class="grid"></div>
  </div>

  <div id="footer"></div>

  <script src="../assets/js/script.js?v=5"></script>
  <script>
    function setLastViewed(id) {
      localStorage.setItem("koleku_last_viewed_id", id);
    }

    function renderProduk(filtered) {
      const grid = document.getElementById("produk-grid");
      if (!filtered || filtered.length === 0) {
        grid.innerHTML = "<p style='text-align:center;padding:40px;color:#999;'>Tidak ada barang di kategori ini.</p>";
        return;
      }
      
      let html = "";
      filtered.forEach(function(p) {
        html += 
        '<a href="produk.html?id=' + p.id_barang + '" style="text-decoration:none; color:inherit;">' +
        '<div class="card" style="cursor:pointer;">' +
          '<img src="' + p.gambar + '" alt="' + p.nama_barang + '" style="width:100%; height:160px; object-fit:cover;">' +
          '<div class="body">' +
            '<div class="title">' + p.nama_barang + '</div>' +
            '<div class="price">Rp ' + (p.harga_tertinggi || p.harga_awal).toLocaleString('id-ID') + '</div>' +
          '</div>' +
        '</div>' +
        '</a>';
      });
      grid.innerHTML = html;
    }

    function filterKategori(kat) {
      if (kat === 'all') {
        renderProduk(window.produkList);
      } else {
        const filtered = window.produkList.filter(function(item) {
          return item.kategori === kat;
        });
        renderProduk(filtered);
      }
    }

    // Tampilkan semua saat halaman dibuka
    document.addEventListener("DOMContentLoaded", async () => {
      // Tunggu renderNavbar dkk selesai
      setTimeout(async () => {
        if (!window.produkList || window.produkList.length === 0) {
          try {
            const res = await fetch('/barang');
            window.produkList = await res.json();
          } catch(e) {
            console.error("Gagal memuat barang:", e);
          }
        }
        renderProduk(window.produkList);
      }, 500);
    });
  </script>
</body>

</html>
