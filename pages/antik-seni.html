<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antik & Seni - KOLEKU</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div id="navbar"></div>

  <div class="container">
    <h1 style="text-align:center; margin:30px 0; color:#b8860b;">Kategori Antik & Seni</h1>
    <div id="produk-grid" class="grid"></div>
  </div>

  <div id="footer"></div>

  <script src="../assets/js/script.js?v=2"></script>
  <script>
    function renderProduk(items) {
      const grid = document.getElementById("produk-grid");
      if (!grid) return;
      let html = "";
      items.forEach(p => {
        html += `
          <a href="produk.html?id=${p.id}" style="text-decoration:none; color:inherit;">
            <div class="card" style="cursor:pointer;">
              <img src="${p.gambar}" alt="${p.nama}" style="width:100%; height:160px; object-fit:cover;">
              <div class="body">
                <div class="title">${p.nama}</div>
                <div class="price">Rp ${p.hargaTertinggi.toLocaleString('id-ID')}</div>
              </div>
            </div>
          </a>`;
      });
      grid.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const items = produkList.filter(p => p.kategori === "Antik & Seni");
      renderProduk(items);
    });
  </script>
</body>
</html>
