<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - KOLEKU</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="icon" href="../assets/images/logo.png">
</head>
<body>
  <div id="navbar"></div>

  <div class="container">
    <div class="form-box">
      <h2>Masuk</h2>
      <p class="subtitle">Masuk ke akun KOLEKU Anda</p>

      <form onsubmit="handleLogin(event)">
        <p id="error" class="error"></p>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="email@contoh.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password" required>
        </div>

        <button type="submit" class="btn btn-block">Masuk</button>

        <p class="form-link">
          Belum punya akun? <a href="daftar.html">Daftar di sini</a>
        </p>
      </form>
    </div>
  </div>

  <div id="footer"></div>
  <script src="../assets/js/script.js?v=5"></script>
</body>
</html>
